<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Roosterwijzigingen – De Hof</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="stage"><div id="track"></div></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SCHOOL        = 'scmoost';
const TOKEN         = 'fkhgkitt0an0snir35c1ed75ls';
const PROXY         = 'https://zermelo-proxy.peoy.workers.dev';
const REFRESH_MS    = 5 * 60 * 1000;
const BOUW_SWITCH_S = 20;   // seconden per onderbouw/bovenbouw pagina
const SUBPAGE_S     = 10;   // seconden per subpagina (overflow)
const MAX_CARDS     = 6;    // kaarten per kolom per subpagina

// ── DOCENTEN ────────────────────────────────────────────────
const DOCENTEN = {
  'naab': 'Mevr. Abbel',      'ftaa': 'Dhr. Akkaya',

  'saag': 'Mevr. Azar Asgari','chba': 'Dhr. Baalla',
  'ukbs': 'Dhr. Bekdas',      'prbe': 'Dhr. de Boer',
  'lsbr': 'Dhr. den Boer',    'gybn': 'Dhr. Boissevain',
  'elbo': 'Mevr. Boon',       'mnbe': 'Mevr. Bridié',
  'jnbj': 'Dhr. Buijs',       'mtbk': 'Mevr. Bussink',
  'mnbu': 'Mevr. Buter',      'eycg': 'Dhr. Craig',
  'nydg': 'Mevr. Dahlberg',   'jugr': 'Mevr. Gerritsen',
  'eaha': 'Mevr. Hemrica',    'marh': 'Mevr. Hinnen',
  'sfim': 'Mevr. Ibrahim',    'kaji': 'Mevr. Jiawan',
  'sijo': 'Mevr. Jongejans',  'jykf': 'Dhr. Kalf',
  'jeke': 'Dhr. Kes',         'ksku': 'Dhr. Keune',
  'mxkr': 'Dhr. Klatser',     'mnkk': 'Dhr. Kok',
  'fakk': 'Mevr. Krikke',     'celr': 'Mevr. Louter',
  'prpr': 'Mevr. Makhan',     'moms': 'Mevr. Markus',
  'mnmg': 'Dhr. Merkelbag',   'ayma': 'Mevr. Mostafa',
  'sesm': 'Mevr. Mowday',     'aemm': 'Mevr. Muileboom',
  'bano': 'Mevr. Nollkämper', 'peoy': 'Dhr. Okorley',
  'mnor': 'Dhr. Ombre',       'fapp': 'Mevr. Poelkamp',
  'alrd': 'Dhr. Razed',       'jaro': 'Dhr. Rook',
  'dero': 'Mevr. Roos',       'enrt': 'Dhr. Rust',
  'pausc': 'Mevr. Schutte',   'hise': 'Dhr. Selman-Pieters',
  'mrsl': 'Mevr. Sloot',      'east': 'Mevr. Smit',
  'qnsn': 'Dhr. van Son',     'pnst': 'Mevr. Sonnevelt',
  'dasr': 'Mevr. Stoker',     'tssn': 'Mevr. van Straaten',
  'mnvs': 'Dhr. van Straaten','geta': 'Mevr. Tjoe-Awie',
  'ibto': 'Dhr. Topal',       'cytl': 'Mevr. Trustfull',
  'divn': 'Mevr. Veen',       'csvn': 'Dhr. van de Ven',
  'gnwe': 'Dhr. Wallé',       'mawf': 'Mevr. van der Werf',
  'adwa': 'Dhr. Wierstra',    'fzel': 'Dhr. van der Zel',
};

// ── HELPERS ──────────────────────────────────────────────────
const KORT = ['zo','ma','di','wo','do','vr','za'];
const MND  = ['januari','februari','maart','april','mei','juni',
              'juli','augustus','september','oktober','november','december'];

function docentNaam(afk) {
  return DOCENTEN[afk?.toLowerCase()] || afk?.toUpperCase() || '–';
}
function lokaalLabel(code) { return code?.toUpperCase() || '–'; }

function updateClocks() {
  const n = new Date();
  const t = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  const d = KORT[n.getDay()] + ' ' + n.getDate() + ' ' + MND[n.getMonth()];
  document.querySelectorAll('.js-clock').forEach(el => el.textContent = t);
  document.querySelectorAll('.js-date').forEach(el  => el.textContent = d);
}
setInterval(updateClocks, 1000);

function getBouw(groups) {
  const m = (groups||[]).join(' ').match(/(\d)/);
  return (m && parseInt(m[1]) >= 4) ? 'bovenbouw' : 'onderbouw';
}

function chunk(arr, n) {
  const out = [];
  for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i+n));
  return out.length ? out : [[]];
}

// ── FETCH ────────────────────────────────────────────────────
async function fetchData() {
  const resp = await fetch(PROXY + '?school=' + SCHOOL + '&token=' + TOKEN);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const json = await resp.json();
  if (json.response?.status >= 400) throw new Error(json.response.message || 'Zermelo fout');
  return json.response?.data || [];
}

// ── PARSE ────────────────────────────────────────────────────
function parse(appts) {
  const now    = new Date();
  const tStart = new Date(now); tStart.setHours(0,0,0,0);
  const tEnd   = new Date(now); tEnd.setDate(tEnd.getDate()+1); tEnd.setHours(23,59,59,999);

  const inRange = appts.filter(a => {
    const ms = a.start * 1000;
    return ms >= tStart.getTime() && ms <= tEnd.getTime();
  });

  // Index non-cancelled by group+subject for replacement matching
  const byKey = {};
  for (const a of inRange) {
    if (a.cancelled) continue;
    const key = [...(a.groups||[]), ...(a.subjects||[])].sort().join('|');
    if (!byKey[key]) byKey[key] = [];
    byKey[key].push(a);
  }

  const result  = [];
  const usedIds = new Set();

  for (const a of inRange) {
    if (!a.cancelled) continue;
    const key = [...(a.groups||[]), ...(a.subjects||[])].sort().join('|');
    const replacement = (byKey[key]||[]).find(r =>
      r.startTimeSlot !== a.startTimeSlot && !usedIds.has(r.id)
    ) || null;
    if (replacement) usedIds.add(replacement.id);

    // Lokaal: only from replacement (tijdwijziging). For ziek: no lokaal needed.
    const lokaalList = replacement
      ? (replacement.locations||[]).map(lokaalLabel).filter(Boolean)
      : [];

    // isToets: no startTimeSlot, or subject contains 'toets'/'schk' teacher
    const isToets = a.startTimeSlot == null;

    result.push({
      soort:    replacement ? 'tijd' : 'ziek',
      uur:      a.startTimeSlot ?? null,
      uurNieuw: replacement?.startTimeSlot ?? null,
      klas:     (a.groups   ||[]).join(', ') || '–',
      vak:      (a.subjects ||[]).join(', ') || '–',
      docent:   (a.teachers ||[]).map(docentNaam).join(', ') || '–',
      lokaalList,
      isToets,
      opmerking: a.changeDescription || '',
      bouw:     getBouw(a.groups),
      ts:       a.start,
      isToday:  new Date(a.start*1000).toDateString() === now.toDateString(),
    });
  }

  return result.sort((a,b) => a.uur - b.uur || a.klas.localeCompare(b.klas));
}

// ── RENDER ───────────────────────────────────────────────────
function cardHTML(item) {
  const isTijd = item.soort === 'tijd';
  const hasArrow = isTijd && item.uurNieuw !== null && item.uurNieuw !== item.uur;

  // Uur block
  let uurBlock;
  if (item.uur === null) {
    // Geen tijdslot — toets of activiteit
    uurBlock = `<div class="card-uur">
      <div class="uur-toets">📋</div>
      <div class="uur-label">toets</div>
    </div>`;
  } else if (hasArrow) {
    uurBlock = `<div class="card-uur">
      <div class="uur-arrow-wrap">
        <span class="uur-oud">${item.uur}</span>
        <span class="uur-pijl">→</span>
        <span class="uur-nieuw">${item.uurNieuw}</span>
      </div>
      <div class="uur-label">uur</div>
    </div>`;
  } else {
    uurBlock = `<div class="card-uur">
      <div class="uur-num">${item.uur}</div>
      <div class="uur-label">uur</div>
    </div>`;
  }

  // Lokaal badges — only when there are lokalen (tijdwijziging with new room)
  const lokaalHTML = item.lokaalList.length
    ? `<span class="sep">·</span>${item.lokaalList.map(l => `<span class="card-lokaal-badge">${l}</span>`).join(' ')}`
    : '';

  // Label rechts
  const label = item.uur === null ? 'Toets' : (isTijd ? 'Wijziging' : 'Vervalt');

  return `<div class="card ${item.soort}">
    ${uurBlock}
    <div>
      <div class="card-docent-naam">${item.docent}</div>
      <div class="card-meta">
        <span class="card-vak">${item.vak}</span>
        <span class="sep">·</span>
        <span class="card-klas">${item.klas}</span>
        ${lokaalHTML}
        ${item.opmerking ? `<span class="sep">·</span><span style="font-size:13px;color:var(--muted)">${item.opmerking}</span>` : ''}
        ${!item.isToday ? `<span class="sep">·</span><span class="dag-badge">morgen</span>` : ''}
      </div>
    </div>
    <div class="card-right">
      <div class="card-soort ${item.soort}">${label}</div>
    </div>
  </div>`;
}

function colHTML(items, type) {
  if (!items.length) return `
    <div class="empty-state">
      <div class="empty-icon">✓</div>
      <div class="empty-text">Geen ${type==='ziek'?'uitgevallen lessen':'tijdwijzigingen'} vandaag</div>
    </div>`;
  return `<div class="cards-grid">${items.map(cardHTML).join('')}</div>`;
}

function dotsHTML(chunks, active) {
  return chunks.map((_,i) =>
    `<div class="sub-dot${i===active?' active':''}"></div>`
  ).join('');
}

function buildPage(bouw, ziekChunks, tijdChunks, ziekPage, tijdPage) {
  const isOb      = bouw === 'onderbouw';
  const bouwLabel = isOb ? 'Onderbouw · Klas 1, 2 &amp; 3' : 'Bovenbouw · Klas 4 &amp; 5';
  const bouwCls   = isOb ? 'onderbouw' : 'bovenbouw';
  const ziekCount = ziekChunks.flat().length;
  const tijdCount = tijdChunks.flat().length;
  const total     = ziekCount + tijdCount;
  const now       = new Date();
  const updateStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  const div = document.createElement('div');
  div.className = 'page';
  div.innerHTML = `
    <header>
      <div class="logo-area">
        <img class="logo-img" src="logo_dehof.png" alt="De Hof"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="fallback-logo">H</div>
        <div class="school-name">
          <div class="havo">Havo</div>
          <div class="naam">De Hof</div>
          <div class="tagline">Oog voor talent</div>
        </div>
      </div>
      <div class="header-center">
        <div class="page-title">Rooster<span>wijzigingen</span></div>
        <div class="bouw-badge ${bouwCls}">${bouwLabel}</div>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div>Vandaag &amp; morgen</div>
        <div class="datetime js-clock">--:--</div>
        <div class="date-sub js-date">--</div>
      </div>
    </header>
    <main>
      <div class="col">
        <div class="col-header">
          <div class="col-icon ziek">🚫</div>
          <div>
            <div class="col-label">Docenten</div>
            <div class="col-title">Uitgevallen lessen</div>
          </div>
          <div class="count-pill">${ziekCount}</div>
        </div>
        ${colHTML(ziekChunks[ziekPage]||[], 'ziek')}
      </div>
      <div class="col">
        <div class="col-header">
          <div class="col-icon tijd">🕐</div>
          <div>
            <div class="col-label">Rooster</div>
            <div class="col-title">Tijdwijzigingen</div>
          </div>
          <div class="count-pill">${tijdCount}</div>
        </div>
        ${colHTML(tijdChunks[tijdPage]||[], 'tijd')}
      </div>
    </main>
    <footer>
      <div class="footer-left">
        <span>Zermelo</span>
        <div class="footer-dot"></div>
        <span>${updateStr}</span>
      </div>
      <div class="footer-center">
        <div class="sub-dots">${dotsHTML(ziekChunks, ziekPage)}</div>
        <div class="progress-bar"><div class="progress-fill js-progress"></div></div>
        <div class="sub-dots">${dotsHTML(tijdChunks, tijdPage)}</div>
      </div>
      <div class="footer-right">${total} wijziging${total!==1?'en':''}</div>
    </footer>`;
  return div;
}

// ── STATE ────────────────────────────────────────────────────
const bouwDefs = ['onderbouw', 'bovenbouw'];
let currentBouwIdx = 0;
let sliding = false;

const pageState = {
  onderbouw: { ziekChunks:[[]], tijdChunks:[[]], ziekPage:0, tijdPage:0 },
  bovenbouw: { ziekChunks:[[]], tijdChunks:[[]], ziekPage:0, tijdPage:0 },
};

// ── SLIDE ENGINE ─────────────────────────────────────────────
// The track always holds exactly ONE page at offset 0.
// To slide: temporarily widen track to 3840px, append new page,
// then CSS-transition translateX to -1920px, then clean up.

function getTrack() { return document.getElementById('track'); }

function mountInitial() {
  const track = getTrack();
  track.innerHTML = '';
  track.style.cssText = 'width:1920px; transform:translateX(0px); transition:none;';
  const bouw = bouwDefs[currentBouwIdx];
  const s = pageState[bouw];
  track.appendChild(buildPage(bouw, s.ziekChunks, s.tijdChunks, s.ziekPage, s.tijdPage));
  updateClocks();
}

function slideTo(newBouw) {
  if (sliding) return;
  sliding = true;

  const track = getTrack();
  const s = pageState[newBouw];
  const newPage = buildPage(newBouw, s.ziekChunks, s.tijdChunks, s.ziekPage, s.tijdPage);

  // Widen track to hold both pages, reset to 0 with NO transition
  track.style.transition = 'none';
  track.style.width = '3840px';
  track.style.transform = 'translateX(0px)';

  // Append new page to the right
  track.appendChild(newPage);
  updateClocks();

  // Force reflow — browser must paint before we add the transition
  track.getBoundingClientRect();

  // Now animate left
  track.style.transition = 'transform 0.75s cubic-bezier(0.77, 0, 0.18, 1)';
  track.style.transform = 'translateX(-1920px)';

  setTimeout(() => {
    track.style.transition = 'none';
    // Remove all but the last child (the new page)
    while (track.children.length > 1) track.removeChild(track.firstElementChild);
    track.style.width = '1920px';
    track.style.transform = 'translateX(0px)';
    sliding = false;
  }, 800);
}

function replaceCurrent(bouw) {
  // If a slide is in progress, wait for it to finish before replacing
  if (sliding) {
    setTimeout(() => replaceCurrent(bouw), 100);
    return;
  }
  const track = getTrack();
  track.style.transition = 'none';
  track.style.width = '1920px';
  track.style.transform = 'translateX(0px)';
  track.innerHTML = '';
  const s = pageState[bouw];
  track.appendChild(buildPage(bouw, s.ziekChunks, s.tijdChunks, s.ziekPage, s.tijdPage));
  updateClocks();
}

// ── PROGRESS BAR ─────────────────────────────────────────────
let progInterval;
function startProgress(seconds) {
  clearInterval(progInterval);
  document.querySelectorAll('.js-progress').forEach(el => el.style.width = '0%');
  let pct = 0;
  progInterval = setInterval(() => {
    pct += 100 / seconds;
    if (pct > 100) pct = 100;
    document.querySelectorAll('.js-progress').forEach(el => el.style.width = pct + '%');
  }, 1000);
}

// ── LOAD DATA ────────────────────────────────────────────────
function loadData(data) {
  bouwDefs.forEach(bouw => {
    const f = data.filter(d => d.bouw === bouw);
    pageState[bouw].ziekChunks = chunk(f.filter(d => d.soort==='ziek'), MAX_CARDS);
    pageState[bouw].tijdChunks = chunk(f.filter(d => d.soort==='tijd'), MAX_CARDS);
    pageState[bouw].ziekPage = 0;
    pageState[bouw].tijdPage = 0;
  });
  replaceCurrent(bouwDefs[currentBouwIdx]);
}

// ── TIMERS ───────────────────────────────────────────────────
// Bouw switch
setInterval(() => {
  currentBouwIdx = (currentBouwIdx + 1) % 2;
  slideTo(bouwDefs[currentBouwIdx]);
  startProgress(BOUW_SWITCH_S);
}, BOUW_SWITCH_S * 1000);

// Subpage flip (overflow cards)
setInterval(() => {
  const bouw = bouwDefs[currentBouwIdx];
  const s = pageState[bouw];
  s.ziekPage = (s.ziekPage + 1) % s.ziekChunks.length;
  s.tijdPage = (s.tijdPage + 1) % s.tijdChunks.length;
  replaceCurrent(bouw);
}, SUBPAGE_S * 1000);

// Data refresh
async function init() {
  try {
    loadData(parse(await fetchData()));
  } catch(e) {
    console.error('Zermelo fout:', e);
  }
}

// ── BOOT ─────────────────────────────────────────────────────
mountInitial();
startProgress(BOUW_SWITCH_S);
init();
setInterval(init, REFRESH_MS);
</script>
</body>
</html>
