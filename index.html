<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Roosterwijzigingen – De Hof</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --pink:    #e91e8c;
  --yellow:  #f5c500;
  --cyan:    #00b4d8;
  --green:   #4caf50;
  --orange:  #ff6b35;
  --bg:      #0d0f14;
  --surface: #161922;
  --border:  rgba(255,255,255,0.07);
  --text:    #f0f2f8;
  --muted:   rgba(240,242,248,0.45);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1920px; height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 700px 500px at 10% 50%, rgba(233,30,140,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 600px 400px at 90% 30%, rgba(0,180,216,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── Stage: viewport window, clips overflow ── */
#stage {
  position: absolute;
  top: 0; left: 0;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
}

/* ── Track: always holds the current page ── */
#track {
  width: 1920px;
  height: 1080px;
}

/* ── Each page fills the stage ── */
.page {
  width: 1920px;
  height: 1080px;
  display: grid;
  grid-template-rows: 108px 1fr 50px;
  padding: 0 56px;
}

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}

.logo-area { display: flex; align-items: center; gap: 20px; min-width: 280px; }
.logo-img { height: 62px; width: auto; filter: drop-shadow(0 0 14px rgba(233,30,140,0.3)); }
.fallback-logo {
  display: none; width: 62px; height: 62px;
  background: linear-gradient(135deg, var(--pink), var(--cyan));
  border-radius: 13px; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 700;
}

.school-name .havo { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
.school-name .naam { font-size: 20px; font-weight: 700; background: linear-gradient(90deg, var(--pink), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.2; }
.school-name .tagline { font-size: 10px; color: var(--muted); }

.header-center { text-align: center; }
.page-title { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
.page-title span { color: var(--pink); }

.bouw-badge {
  display: inline-block; margin-top: 6px;
  padding: 4px 16px; border-radius: 999px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
}
.bouw-badge.onderbouw { background: rgba(0,180,216,0.12); color: var(--cyan); border: 1px solid rgba(0,180,216,0.3); }
.bouw-badge.bovenbouw { background: rgba(245,197,0,0.1); color: var(--yellow); border: 1px solid rgba(245,197,0,0.3); }

.header-right { text-align: right; min-width: 280px; }
.live-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.25);
  border-radius: 999px; padding: 5px 14px;
  font-size: 11px; font-weight: 600; color: var(--green);
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }
.datetime { font-size: 28px; font-weight: 300; font-family: 'DM Mono', monospace; }
.date-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── Main grid ── */
main {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 28px; padding: 22px 0;
  overflow: hidden; min-height: 0;
}

.col { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

.col-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; flex-shrink: 0;
}
.col-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.col-icon.ziek { background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.3); }
.col-icon.tijd { background: rgba(0,180,216,0.12); border: 1px solid rgba(0,180,216,0.25); }
.col-label { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.col-title { font-size: 18px; font-weight: 700; line-height: 1; }
.count-pill {
  margin-left: auto; background: var(--surface); border: 1px solid var(--border);
  border-radius: 999px; padding: 3px 12px; font-size: 13px; font-weight: 600; color: var(--muted);
}

/* ── Cards ── */
.cards-grid { display: flex; flex-direction: column; gap: 9px; flex: 1; overflow: hidden; min-height: 0; }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 0 22px;
  display: grid; grid-template-columns: 70px 1fr auto;
  align-items: center; gap: 18px;
  position: relative; overflow: hidden;
  flex: 1;
}
.card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 4px 0 0 4px;
}
.card.ziek::before { background: var(--orange); }
.card.tijd::before { background: var(--cyan); }

/* Hour block */
.card-uur { text-align: center; }
.uur-num { font-size: 40px; font-weight: 800; font-family: 'DM Mono', monospace; line-height: 1; }
.card.ziek .uur-num { color: var(--orange); }
.card.tijd .uur-num { color: var(--cyan); }
.uur-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* Arrow for time change */
.uur-arrow-wrap { display: flex; align-items: center; justify-content: center; gap: 3px; line-height: 1; flex-wrap: nowrap; }
.uur-oud { font-size: 20px; font-weight: 800; font-family: 'DM Mono', monospace; color: var(--muted); text-decoration: line-through; opacity: 0.6; }
.uur-pijl { font-size: 16px; color: var(--yellow); font-weight: 700; }
.uur-nieuw { font-size: 30px; font-weight: 800; font-family: 'DM Mono', monospace; color: var(--cyan); }
.uur-toets { font-size: 26px; line-height: 1; margin-bottom: 2px; }

/* Card info */
.card-docent-naam { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 6px; }
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-vak { font-size: 16px; font-weight: 600; color: rgba(240,242,248,0.75); }
.card-klas { font-size: 15px; color: var(--muted); }
.sep { color: rgba(255,255,255,0.15); font-size: 14px; }
.card-lokaal-badge {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  border-radius: 6px; padding: 2px 8px;
  font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace;
  color: rgba(240,242,248,0.55);
}
.dag-badge {
  background: rgba(245,197,0,0.1); border: 1px solid rgba(245,197,0,0.3);
  border-radius: 999px; padding: 2px 10px;
  font-size: 12px; font-weight: 600; color: var(--yellow);
}

.card-right { text-align: right; flex-shrink: 0; }
.card-soort {
  display: inline-block; padding: 6px 16px; border-radius: 999px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
}
.card-soort.ziek { background: rgba(255,107,53,0.12); color: var(--orange); border: 1px solid rgba(255,107,53,0.25); }
.card-soort.tijd { background: rgba(0,180,216,0.1); color: var(--cyan); border: 1px solid rgba(0,180,216,0.2); }

/* ── Empty ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 12px;
  background: var(--surface); border: 1px dashed var(--border); border-radius: 14px;
}
.empty-icon { font-size: 36px; opacity: 0.18; }
.empty-text { font-size: 15px; color: var(--muted); }

/* ── Loading / Error ── */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 16px; grid-column: 1/-1;
}
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--muted); }
.error-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; grid-column: 1/-1; }
.error-text { font-size: 15px; color: var(--orange); }

/* ── Footer ── */
footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); flex-shrink: 0; }
.footer-left { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.footer-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }
.progress-bar { width: 220px; height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--cyan)); border-radius: 999px; width: 0%; transition: width 1s linear; }
.footer-right { font-size: 11px; color: var(--muted); }
.footer-center { display: flex; align-items: center; gap: 10px; }
.sub-dots { display: flex; gap: 5px; align-items: center; }
.sub-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
.sub-dot.active { background: var(--muted); }

</style>
</head>
<body>
<div id="stage"><div id="track"></div></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const SCHOOL        = 'scmoost';
const TOKEN         = 'fkhgkitt0an0snir35c1ed75ls';
const PROXY         = 'https://zermelo-proxy.peoy.workers.dev';
const REFRESH_MS    = 5 * 60 * 1000;
const BOUW_SWITCH_S = 20;   // seconden per onderbouw/bovenbouw pagina
const SUBPAGE_S     = 10;   // seconden per subpagina (overflow)
const MAX_CARDS     = 6;    // kaarten per kolom per subpagina

// ── DOCENTEN ────────────────────────────────────────────────
const DOCENTEN = {
  'naab': 'Mevr. Abbel',      'ftaa': 'Dhr. Akkaya',
  'waao': 'Mevr. Aktaou',     'soal': 'Mevr. Alaoui Mdaghri',
  'saag': 'Mevr. Azar Asgari','chba': 'Dhr. Baalla',
  'ukbs': 'Dhr. Bekdas',      'prbe': 'Dhr. de Boer',
  'lsbr': 'Dhr. den Boer',    'gybn': 'Dhr. Boissevain',
  'elbo': 'Mevr. Boon',       'mnbe': 'Mevr. Bridié',
  'jnbj': 'Dhr. Buijs',       'mtbk': 'Mevr. Bussink',
  'mnbu': 'Mevr. Buter',      'eycg': 'Dhr. Craig',
  'nydg': 'Mevr. Dahlberg',   'jugr': 'Mevr. Gerritsen',
  'eaha': 'Mevr. Hemrica',    'marh': 'Mevr. Hinnen',
  'sfim': 'Mevr. Ibrahim',    'kaji': 'Mevr. Jiawan',
  'sijo': 'Mevr. Jongejans',  'jykf': 'Dhr. Kalf',
  'jeke': 'Dhr. Kes',         'ksku': 'Dhr. Keune',
  'mxkr': 'Dhr. Klatser',     'mnkk': 'Dhr. Kok',
  'fakk': 'Mevr. Krikke',     'celr': 'Mevr. Louter',
  'prpr': 'Mevr. Makhan',     'moms': 'Mevr. Markus',
  'mnmg': 'Dhr. Merkelbag',   'ayma': 'Mevr. Mostafa',
  'sesm': 'Mevr. Mowday',     'aemm': 'Mevr. Muileboom',
  'bano': 'Mevr. Nollkämper', 'peoy': 'Dhr. Okorley',
  'mnor': 'Dhr. Ombre',       'fapp': 'Mevr. Poelkamp',
  'alrd': 'Dhr. Razed',       'jaro': 'Dhr. Rook',
  'dero': 'Mevr. Roos',       'enrt': 'Dhr. Rust',
  'pausc': 'Mevr. Schutte',   'hise': 'Dhr. Selman-Pieters',
  'mrsl': 'Mevr. Sloot',      'east': 'Mevr. Smit',
  'qnsn': 'Dhr. van Son',     'pnst': 'Mevr. Sonnevelt',
  'dasr': 'Mevr. Stoker',     'tssn': 'Mevr. van Straaten',
  'mnvs': 'Dhr. van Straaten','geta': 'Mevr. Tjoe-Awie',
  'ibto': 'Dhr. Topal',       'cytl': 'Mevr. Trustfull',
  'divn': 'Mevr. Veen',       'csvn': 'Dhr. van de Ven',
  'gnwe': 'Dhr. Wallé',       'mawf': 'Mevr. van der Werf',
  'adwa': 'Dhr. Wierstra',    'fzel': 'Dhr. van der Zel',
};

// ── HELPERS ──────────────────────────────────────────────────
const KORT = ['zo','ma','di','wo','do','vr','za'];
const MND  = ['januari','februari','maart','april','mei','juni',
              'juli','augustus','september','oktober','november','december'];

function docentNaam(afk) {
  return DOCENTEN[afk?.toLowerCase()] || afk?.toUpperCase() || '–';
}
// lokaalLabel replaced by lokaalNaam (uses live LOKALEN lookup)

function updateClocks() {
  const n = new Date();
  const t = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  const d = KORT[n.getDay()] + ' ' + n.getDate() + ' ' + MND[n.getMonth()];
  document.querySelectorAll('.js-clock').forEach(el => el.textContent = t);
  document.querySelectorAll('.js-date').forEach(el  => el.textContent = d);
}
setInterval(updateClocks, 1000);

function getBouw(groups) {
  const m = (groups||[]).join(' ').match(/(\d)/);
  return (m && parseInt(m[1]) >= 4) ? 'bovenbouw' : 'onderbouw';
}

function chunk(arr, n) {
  const out = [];
  for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i+n));
  return out.length ? out : [[]];
}

// ── FETCH ────────────────────────────────────────────────────
async function zermeloGet(type) {
  const resp = await fetch(PROXY + '?school=' + SCHOOL + '&token=' + TOKEN + '&type=' + type);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const json = await resp.json();
  if (json.response?.status >= 400) throw new Error(json.response.message || 'Zermelo fout');
  return json.response?.data || [];
}

// Live lookups — populated by fetchLookups() at boot
let LOKALEN    = {}; // lokaalcode -> display naam
let STAMKLASSEN = {}; // groepcode -> stamklas naam

async function fetchLookups() {
  try {
    const [locs, groups] = await Promise.all([
      zermeloGet('locations'),
      zermeloGet('groups'),
    ]);
    LOKALEN = {};
    for (const l of locs) {
      if (l.code) LOKALEN[l.code.toLowerCase()] = (l.name || l.code).toUpperCase();
    }
    STAMKLASSEN = {};
    for (const g of groups) {
      if (g.code && g.code.toLowerCase().startsWith('lh')) {
        STAMKLASSEN[g.code.toLowerCase()] = g.code.toUpperCase();
      }
    }
    console.log('Lookups geladen:', Object.keys(LOKALEN).length, 'lokalen,', Object.keys(STAMKLASSEN).length, 'stamklassen');
  } catch(e) {
    console.warn('Lookups ophalen mislukt, gebruik fallback:', e);
  }
}

async function fetchData() {
  return zermeloGet('appointments');
}

function lokaalNaam(code) {
  if (!code) return null;
  return LOKALEN[code.toLowerCase()] || code.toUpperCase();
}

function stamklasNaam(groupCode) {
  const parts = (groupCode || '').toLowerCase().split('.');
  for (const p of parts) {
    if (STAMKLASSEN[p]) return STAMKLASSEN[p];
    if (/^lh[1-5][a-z]$/.test(p)) return p.toUpperCase();
  }
  return null;
}

// ── PARSE ────────────────────────────────────────────────────
function parse(appts) {
  const now    = new Date();
  const tStart = new Date(now); tStart.setHours(0,0,0,0);
  const tEnd   = new Date(now); tEnd.setDate(tEnd.getDate()+1); tEnd.setHours(23,59,59,999);

  const inRange = appts.filter(a => {
    const ms = a.start * 1000;
    return ms >= tStart.getTime() && ms <= tEnd.getTime();
  });

  // Index ALL non-cancelled appointments by group+subject+timeslot
  const byKey      = {}; // group+subject -> list of non-cancelled
  const byExact    = {}; // group+subject+timeslot -> non-cancelled (for same-slot replacement detection)
  for (const a of inRange) {
    if (a.cancelled) continue;
    const key      = [...(a.groups||[]), ...(a.subjects||[])].sort().join('|');
    const exactKey = key + '|' + a.startTimeSlot;
    if (!byKey[key])       byKey[key]       = [];
    if (!byExact[exactKey]) byExact[exactKey] = [];
    byKey[key].push(a);
    byExact[exactKey].push(a);
  }

  const result  = [];
  const usedIds = new Set();

  for (const a of inRange) {
    if (!a.cancelled) continue;

    const key      = [...(a.groups||[]), ...(a.subjects||[])].sort().join('|');
    const exactKey = key + '|' + a.startTimeSlot;

    // Skip if there's a non-cancelled appointment at the SAME timeslot
    // → this is a lokaal- or docentwijziging, not uitval or tijdwijziging
    if ((byExact[exactKey]||[]).length > 0) continue;

    // Look for replacement at a DIFFERENT timeslot (= echte tijdwijziging)
    const replacement = (byKey[key]||[]).find(r =>
      r.startTimeSlot !== a.startTimeSlot && !usedIds.has(r.id)
    ) || null;
    if (replacement) usedIds.add(replacement.id);

    const lokaalList = replacement
      ? (replacement.locations||[]).map(lokaalNaam).filter(Boolean)
      : [];

    const isToets = a.startTimeSlot == null;

    result.push({
      soort:    replacement ? 'tijd' : 'ziek',
      uur:      a.startTimeSlot ?? null,
      uurNieuw: replacement?.startTimeSlot ?? null,
      klas:     (() => {
        const stamklassen = [...new Set((a.groups||[]).map(stamklasNaam).filter(Boolean))];
        return stamklassen.length ? stamklassen.join(', ') : (a.groups||[]).join(', ') || '–';
      })(),
      vak:      (a.subjects ||[]).join(', ') || '–',
      docent:   (a.teachers ||[]).map(docentNaam).join(', ') || '–',
      lokaalList,
      isToets,
      opmerking: a.changeDescription || '',
      bouw:     getBouw(a.groups),
      ts:       a.start,
      isToday:  new Date(a.start*1000).toDateString() === now.toDateString(),
    });
  }

  return result.sort((a,b) => a.uur - b.uur || a.klas.localeCompare(b.klas));
}

// ── RENDER ───────────────────────────────────────────────────
function cardHTML(item) {
  const isTijd = item.soort === 'tijd';
  const hasArrow = isTijd && item.uurNieuw !== null && item.uurNieuw !== item.uur;

  // Uur block
  let uurBlock;
  if (item.uur === null) {
    // Geen tijdslot — toets of activiteit
    uurBlock = `<div class="card-uur">
      <div class="uur-toets">📋</div>
      <div class="uur-label">toets</div>
    </div>`;
  } else if (hasArrow) {
    uurBlock = `<div class="card-uur">
      <div class="uur-arrow-wrap">
        <span class="uur-oud">${item.uur}</span>
        <span class="uur-pijl">→</span>
        <span class="uur-nieuw">${item.uurNieuw}</span>
      </div>
      <div class="uur-label">uur</div>
    </div>`;
  } else {
    uurBlock = `<div class="card-uur">
      <div class="uur-num">${item.uur}</div>
      <div class="uur-label">uur</div>
    </div>`;
  }

  // Lokaal badges — only when there are lokalen (tijdwijziging with new room)
  const lokaalHTML = item.lokaalList.length
    ? `<span class="sep">·</span>${item.lokaalList.map(l => `<span class="card-lokaal-badge">${l}</span>`).join(' ')}`
    : '';

  // Label rechts
  const label = item.uur === null ? 'Toets' : (isTijd ? 'Wijziging' : 'Vervalt');

  return `<div class="card ${item.soort}">
    ${uurBlock}
    <div>
      <div class="card-docent-naam">${item.docent}</div>
      <div class="card-meta">
        <span class="card-vak">${item.vak}</span>
        <span class="sep">·</span>
        <span class="card-klas">${item.klas}</span>
        ${lokaalHTML}
        ${item.opmerking ? `<span class="sep">·</span><span style="font-size:13px;color:var(--muted)">${item.opmerking}</span>` : ''}
        ${!item.isToday ? `<span class="sep">·</span><span class="dag-badge">morgen</span>` : ''}
      </div>
    </div>
    <div class="card-right">
      <div class="card-soort ${item.soort}">${label}</div>
    </div>
  </div>`;
}

function colHTML(items, type) {
  if (!items.length) return `
    <div class="empty-state">
      <div class="empty-icon">✓</div>
      <div class="empty-text">Geen ${type==='ziek'?'uitgevallen lessen':'tijdwijzigingen'} vandaag</div>
    </div>`;
  return `<div class="cards-grid">${items.map(cardHTML).join('')}</div>`;
}

function dotsHTML(chunks, active) {
  return chunks.map((_,i) =>
    `<div class="sub-dot${i===active?' active':''}"></div>`
  ).join('');
}

function buildPage(bouw, ziekChunks, tijdChunks, ziekPage, tijdPage) {
  const isOb      = bouw === 'onderbouw';
  const bouwLabel = isOb ? 'Onderbouw · Klas 1, 2 &amp; 3' : 'Bovenbouw · Klas 4 &amp; 5';
  const bouwCls   = isOb ? 'onderbouw' : 'bovenbouw';
  const ziekCount = ziekChunks.flat().length;
  const tijdCount = tijdChunks.flat().length;
  const total     = ziekCount + tijdCount;
  const now       = new Date();
  const updateStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  const div = document.createElement('div');
  div.className = 'page';
  div.innerHTML = `
    <header>
      <div class="logo-area">
        <img class="logo-img" src="logo_dehof.png" alt="De Hof"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="fallback-logo">H</div>
        <div class="school-name">
          <div class="havo">Havo</div>
          <div class="naam">De Hof</div>
          <div class="tagline">Oog voor talent</div>
        </div>
      </div>
      <div class="header-center">
        <div class="page-title">Rooster<span>wijzigingen</span></div>
        <div class="bouw-badge ${bouwCls}">${bouwLabel}</div>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div>Vandaag &amp; morgen</div>
        <div class="datetime js-clock">--:--</div>
        <div class="date-sub js-date">--</div>
      </div>
    </header>
    <main>
      <div class="col">
        <div class="col-header">
          <div class="col-icon ziek">🚫</div>
          <div>
            <div class="col-label">Docenten</div>
            <div class="col-title">Uitgevallen lessen</div>
          </div>
          <div class="count-pill">${ziekCount}</div>
        </div>
        ${colHTML(ziekChunks[ziekPage]||[], 'ziek')}
      </div>
      <div class="col">
        <div class="col-header">
          <div class="col-icon tijd">🕐</div>
          <div>
            <div class="col-label">Rooster</div>
            <div class="col-title">Tijdwijzigingen</div>
          </div>
          <div class="count-pill">${tijdCount}</div>
        </div>
        ${colHTML(tijdChunks[tijdPage]||[], 'tijd')}
      </div>
    </main>
    <footer>
      <div class="footer-left">
        <span>Zermelo</span>
        <div class="footer-dot"></div>
        <span>${updateStr}</span>
      </div>
      <div class="footer-center">
        <div class="sub-dots">${dotsHTML(ziekChunks, ziekPage)}</div>
        <div class="progress-bar"><div class="progress-fill js-progress"></div></div>
        <div class="sub-dots">${dotsHTML(tijdChunks, tijdPage)}</div>
      </div>
      <div class="footer-right">${total} wijziging${total!==1?'en':''}</div>
    </footer>`;
  return div;
}

// ── STATE ────────────────────────────────────────────────────
const bouwDefs = ['onderbouw', 'bovenbouw'];
let currentBouwIdx = 0;
let sliding = false;

const pageState = {
  onderbouw: { ziekChunks:[[]], tijdChunks:[[]], ziekPage:0, tijdPage:0 },
  bovenbouw: { ziekChunks:[[]], tijdChunks:[[]], ziekPage:0, tijdPage:0 },
};

// ── SLIDE ENGINE ─────────────────────────────────────────────
// Uses a separate fixed-position overlay for the incoming page.
// Current page stays in #track. Incoming page slides in on top.
// Zero risk of track being empty = zero black screens.

const stage = document.getElementById('stage');

function mountInitial() {
  const track = document.getElementById('track');
  track.innerHTML = '';
  const bouw = bouwDefs[currentBouwIdx];
  const s = pageState[bouw];
  track.appendChild(buildPage(bouw, s.ziekChunks, s.tijdChunks, s.ziekPage, s.tijdPage));
  updateClocks();
}

function slideTo(newBouw) {
  if (sliding) return;
  sliding = true;

  const s = pageState[newBouw];
  const incoming = buildPage(newBouw, s.ziekChunks, s.tijdChunks, s.ziekPage, s.tijdPage);

  // Place incoming page off-screen to the right, on top of stage
  incoming.style.cssText = `
    position: absolute;
    top: 0; left: 1920px;
    width: 1920px; height: 1080px;
    z-index: 10;
    transition: none;
  `;
  stage.appendChild(incoming);
  updateClocks();

  // Force reflow
  incoming.getBoundingClientRect();

  // Slide both pages left simultaneously
  const track = document.getElementById('track');
  track.style.transition = 'transform 0.75s cubic-bezier(0.77, 0, 0.18, 1)';
  track.style.transform = 'translateX(-1920px)';
  incoming.style.transition = 'transform 0.75s cubic-bezier(0.77, 0, 0.18, 1)';
  incoming.style.transform = 'translateX(-1920px)';

  setTimeout(() => {
    // Move incoming into track, reset everything
    track.style.transition = 'none';
    track.style.transform = 'translateX(0px)';
    incoming.style.cssText = '';
    track.innerHTML = '';
    track.appendChild(incoming);
    sliding = false;
  }, 800);
}

function replaceCurrent(bouw) {
  if (sliding) {
    setTimeout(() => replaceCurrent(bouw), 150);
    return;
  }
  const track = document.getElementById('track');
  track.style.transition = 'none';
  track.style.transform = 'translateX(0px)';
  track.innerHTML = '';
  const s = pageState[bouw];
  track.appendChild(buildPage(bouw, s.ziekChunks, s.tijdChunks, s.ziekPage, s.tijdPage));
  updateClocks();
}

// ── PROGRESS BAR ─────────────────────────────────────────────
let progInterval;
function startProgress(seconds) {
  clearInterval(progInterval);
  document.querySelectorAll('.js-progress').forEach(el => el.style.width = '0%');
  let pct = 0;
  progInterval = setInterval(() => {
    pct += 100 / seconds;
    if (pct > 100) pct = 100;
    document.querySelectorAll('.js-progress').forEach(el => el.style.width = pct + '%');
  }, 1000);
}

// ── LOAD DATA ────────────────────────────────────────────────
function loadData(data) {
  bouwDefs.forEach(bouw => {
    const f = data.filter(d => d.bouw === bouw);
    pageState[bouw].ziekChunks = chunk(f.filter(d => d.soort==='ziek'), MAX_CARDS);
    pageState[bouw].tijdChunks = chunk(f.filter(d => d.soort==='tijd'), MAX_CARDS);
    pageState[bouw].ziekPage = 0;
    pageState[bouw].tijdPage = 0;
  });
  replaceCurrent(bouwDefs[currentBouwIdx]);
}

// ── TIMERS ───────────────────────────────────────────────────
// Bouw switch
setInterval(() => {
  currentBouwIdx = (currentBouwIdx + 1) % 2;
  slideTo(bouwDefs[currentBouwIdx]);
  startProgress(BOUW_SWITCH_S);
}, BOUW_SWITCH_S * 1000);

// Subpage flip (overflow cards)
setInterval(() => {
  const bouw = bouwDefs[currentBouwIdx];
  const s = pageState[bouw];
  s.ziekPage = (s.ziekPage + 1) % s.ziekChunks.length;
  s.tijdPage = (s.tijdPage + 1) % s.tijdChunks.length;
  replaceCurrent(bouw);
}, SUBPAGE_S * 1000);

// Data refresh
async function init() {
  try {
    loadData(parse(await fetchData()));
  } catch(e) {
    console.error('Zermelo fout:', e);
  }
}

// ── BOOT ─────────────────────────────────────────────────────
mountInitial();
startProgress(BOUW_SWITCH_S);
// Fetch lookups first, but always start data regardless of lookup result
fetchLookups().finally(() => {
  init();
  setInterval(init, REFRESH_MS);
  setInterval(fetchLookups, 60 * 60 * 1000);
});
</script>
